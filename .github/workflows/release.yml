name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            rust_features: metal
          - platform: macos-latest
            target: x86_64-apple-darwin
            rust_features: metal
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            rust_features: ""
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            rust_features: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build + publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows Authenticode
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          # Tauri updater signing (Minisign / Ed25519)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "offline.cat ${{ github.ref_name }}"
          releaseBody: |
            Download the matching asset for your platform below.

            - macOS (Apple Silicon): `offline.cat_${{ github.ref_name }}_aarch64.dmg`
            - macOS (Intel): `offline.cat_${{ github.ref_name }}_x64.dmg`
            - Windows: `offline.cat_${{ github.ref_name }}_x64_en-US.msi`
            - Linux: `offline.cat_${{ github.ref_name }}_amd64.AppImage`
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }} ${{ matrix.rust_features &&
            format('--features {0}', matrix.rust_features) || '' }}

  release-notes:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Append auto-generated release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -eu
          generated=$(gh api "repos/$REPO/releases/generate-notes" \
            -f tag_name="$TAG" --jq .body)
          current=$(gh release view "$TAG" --json body --jq .body)
          printf '%s\n\n---\n\n%s\n' "$current" "$generated" \
            | gh release edit "$TAG" --notes-file -
