name: Validate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: validate-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (lint + typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Biome check (lint + format)
        run: npm run lint

      - name: TypeScript type check
        run: npm run typecheck

      - name: Vitest
        run: npx vitest run

  rust-fmt:
    name: Rust (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

  rust-check:
    name: Rust (clippy + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri + llama.cpp system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --lib --no-default-features --all-targets -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --lib --no-default-features
